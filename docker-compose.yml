services:
  db:
    image: postgres:16-alpine
    container_name: payroll-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payroll
    ports:
      - "5432:5432"
    volumes:
      - payroll_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroll"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: payroll-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: mysecretkey123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payroll
      FLASK_DEBUG: "false"
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 8080
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USE_TLS: "true"
      MAIL_USERNAME: rayalabhargavsai@gmail.com
      MAIL_PASSWORD: uexqlyyfkfhtsepp
      MAIL_DEFAULT_SENDER: rayalabhargavsai@gmail.com
    ports:
      # App URL: http://localhost:8082 (8080 is used by Tomcat on this machine)
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/login')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./app/static/payslips:/app/app/static/payslips
      - ./app/static/uploads:/app/app/static/uploads

volumes:
  payroll_postgres_data:
